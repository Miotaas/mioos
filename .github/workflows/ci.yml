name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: "file:./ci.db"
      MIOOS_USERNAME: ci
      MIOOS_PASSWORD: ci
      SESSION_SECRET: ci-secret-ci-secret-ci-secret-123456
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install
        run: npm ci
      - name: Prisma generate
        run: npx prisma generate
      - name: Apply schema to scratch DB
        run: npx prisma db push --skip-generate
      - name: Lint
        run: npm run lint --if-present
      - name: Build (smoke test)
        run: npm run build
